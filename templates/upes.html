<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UPES Campus Explorer — GIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent-blue: #58a6ff;
    --accent-teal: #3fb950;
    --accent-orange: #f0883e;
    --accent-purple: #bc8cff;
    --campus-b: #1f6feb;
    --campus-k: #238636;
    --cat-academic: #388bfd;
    --cat-sports: #56d364;
    --cat-cafe: #f78166;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --sidebar: 340px;
    --header: 56px;
    --radius: 8px;
    --radius-lg: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; }

  /* ── LAYOUT ── */
  #app { display: grid; grid-template-rows: var(--header) 1fr; grid-template-columns: var(--sidebar) 1fr; height: 100vh; }
  #header { grid-column: 1 / -1; grid-row: 1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; padding: 0 20px; z-index: 100; }
  #sidebar { grid-column: 1; grid-row: 2; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #map-wrap { grid-column: 2; grid-row: 2; position: relative; }
  #map { width: 100%; height: 100%; }

  /* ── HEADER ── */
  .logo { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; white-space: nowrap; }
  .logo span { color: var(--accent-blue); }
  .header-badge { font-family: var(--font-mono); font-size: 10px; background: rgba(88,166,255,0.12); color: var(--accent-blue); border: 1px solid rgba(88,166,255,0.25); padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .header-sep { flex: 1; }
  #search-bar { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 12px; height: 34px; width: 260px; transition: border-color 0.2s; }
  #search-bar:focus-within { border-color: var(--accent-blue); }
  #search-bar input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 13px; flex: 1; }
  #search-bar input::placeholder { color: var(--text-dim); }
  .search-icon { color: var(--text-dim); font-size: 13px; }
  #stats-strip { display: flex; gap: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* ── SIDEBAR ── */
  .sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-title { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

  /* Campus toggle */
  .campus-toggle { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 10px; }
  .ctbtn { border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: var(--font-body); font-size: 12px; font-weight: 500; padding: 6px 4px; border-radius: var(--radius); cursor: pointer; transition: all 0.2s; text-align: center; }
  .ctbtn:hover { border-color: var(--border-hover); color: var(--text); }
  .ctbtn.active-all { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: var(--accent-blue); }
  .ctbtn.active-b { background: rgba(31,111,235,0.15); border-color: rgba(31,111,235,0.4); color: #58a6ff; }
  .ctbtn.active-k { background: rgba(35,134,54,0.15); border-color: rgba(35,134,54,0.4); color: var(--accent-teal); }

  /* Type filter */
  .type-filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .tfbtn { border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: var(--font-mono); font-size: 10px; padding: 4px 10px; border-radius: 20px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .tfbtn:hover { border-color: var(--border-hover); color: var(--text); }
  .tfbtn.active { color: var(--text); }
  .tfbtn[data-t="all"].active { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
  .tfbtn[data-t="academic"].active { background: rgba(56,139,253,0.15); border-color: rgba(56,139,253,0.4); color: var(--cat-academic); }
  .tfbtn[data-t="sports"].active { background: rgba(86,211,100,0.15); border-color: rgba(86,211,100,0.4); color: var(--cat-sports); }
  .tfbtn[data-t="cafe"].active { background: rgba(247,129,102,0.15); border-color: rgba(247,129,102,0.4); color: var(--cat-cafe); }
  .tfbtn .tdot { width: 6px; height: 6px; border-radius: 50%; }

  /* Place list */
  #place-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  #place-list::-webkit-scrollbar { width: 4px; }
  #place-list::-webkit-scrollbar-track { background: transparent; }
  #place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .place-item { padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; }
  .place-item:hover { background: rgba(255,255,255,0.04); border-left-color: var(--border-hover); }
  .place-item.selected { background: rgba(88,166,255,0.07); border-left-color: var(--accent-blue); }
  .pi-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .pi-icon.academic { background: rgba(56,139,253,0.15); }
  .pi-icon.sports { background: rgba(86,211,100,0.15); }
  .pi-icon.cafe { background: rgba(247,129,102,0.15); }
  .pi-info { flex: 1; min-width: 0; }
  .pi-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pi-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; }
  .campus-pill { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 500; }
  .cp-b { background: rgba(31,111,235,0.2); color: #58a6ff; }
  .cp-k { background: rgba(35,134,54,0.2); color: var(--accent-teal); }
  .no-results { padding: 32px 16px; text-align: center; color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; }

  /* ── DETAIL PANEL ── */
  #detail-panel { position: absolute; bottom: 16px; right: 16px; width: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); z-index: 500; overflow: hidden; transform: translateY(20px); opacity: 0; pointer-events: none; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s; }
  #detail-panel.open { transform: translateY(0); opacity: 1; pointer-events: all; }
  .dp-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .dp-close { float: right; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; margin-top: -2px; }
  .dp-close:hover { color: var(--text); }
  .dp-type-badge { font-family: var(--font-mono); font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 3px; display: inline-block; margin-bottom: 6px; }
  .dtb-academic { background: rgba(56,139,253,0.15); color: var(--cat-academic); }
  .dtb-sports { background: rgba(86,211,100,0.15); color: var(--cat-sports); }
  .dtb-cafe { background: rgba(247,129,102,0.15); color: var(--cat-cafe); }
  .dp-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .dp-body { padding: 12px 14px; }
  .dp-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; }
  .dp-rows { display: flex; flex-direction: column; gap: 6px; }
  .dp-row { display: flex; align-items: flex-start; gap: 8px; font-size: 11px; }
  .dp-row-label { font-family: var(--font-mono); color: var(--text-dim); width: 56px; flex-shrink: 0; padding-top: 1px; }
  .dp-row-val { color: var(--text); line-height: 1.5; }
  .dp-highlight { margin-top: 10px; background: rgba(88,166,255,0.07); border: 1px solid rgba(88,166,255,0.15); border-radius: 6px; padding: 8px 10px; font-size: 11px; color: var(--accent-blue); display: flex; gap: 6px; align-items: center; }

  /* ── MAP OVERLAY UI ── */
  .map-badge { position: absolute; top: 12px; left: 12px; z-index: 400; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 12px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); pointer-events: none; }
  #coord-display { position: absolute; bottom: 12px; left: 12px; z-index: 400; background: rgba(13,17,23,0.85); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); pointer-events: none; backdrop-filter: blur(4px); }
  #count-badge { position: absolute; top: 12px; right: 12px; z-index: 400; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 12px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  #count-badge b { color: var(--text); }

  /* Leaflet overrides */
  .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: var(--radius) !important; overflow: hidden; }
  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text-muted) !important; border-bottom: 1px solid var(--border) !important; font-size: 16px !important; width: 30px !important; height: 30px !important; line-height: 30px !important; }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; color: var(--text) !important; }
  .leaflet-control-attribution { background: rgba(13,17,23,0.8) !important; color: var(--text-dim) !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: var(--text-dim) !important; }
  .leaflet-popup-content-wrapper { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius-lg) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 0 !important; }
  .leaflet-popup-close-button { color: var(--text-muted) !important; top: 8px !important; right: 10px !important; font-size: 18px !important; }

  /* Animations */
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .place-item { animation: fadeSlideIn 0.2s ease both; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="logo">UPES <span>GIS</span></div>
    <div class="header-badge">Campus Explorer v2.0</div>
    <div class="header-sep"></div>
    <div id="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search buildings, cafes, sports…" autocomplete="off"/>
    </div>
    <div id="stats-strip">
      <div class="stat-item"><div class="stat-dot" style="background:var(--cat-academic)"></div><span id="s-academic">—</span> academic</div>
      <div class="stat-item"><div class="stat-dot" style="background:var(--cat-sports)"></div><span id="s-sports">—</span> sports</div>
      <div class="stat-item"><div class="stat-dot" style="background:var(--cat-cafe)"></div><span id="s-cafe">—</span> cafes</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Campus</div>
      <div class="campus-toggle">
        <button class="ctbtn active-all" data-campus="all">All</button>
        <button class="ctbtn" data-campus="bidholi">Bidholi</button>
        <button class="ctbtn" data-campus="kandoli">Kandoli</button>
      </div>
      <div class="type-filters">
        <button class="tfbtn active" data-t="all"><div class="tdot" style="background:var(--text-muted)"></div>All</button>
        <button class="tfbtn" data-t="academic"><div class="tdot" style="background:var(--cat-academic)"></div>Academic</button>
        <button class="tfbtn" data-t="sports"><div class="tdot" style="background:var(--cat-sports)"></div>Sports</button>
        <button class="tfbtn" data-t="cafe"><div class="tdot" style="background:var(--cat-cafe)"></div>Cafe</button>
      </div>
    </div>
    <div id="place-list"></div>
  </aside>

  <!-- MAP -->
  <main id="map-wrap">
    <div id="map"></div>
    <div class="map-badge">◉ Live Map — Dehradun, Uttarakhand</div>
    <div id="coord-display">Hover map for coordinates</div>
    <div id="count-badge">Showing <b id="visible-count">0</b> locations</div>

    <!-- DETAIL PANEL -->
    <div id="detail-panel">
      <div class="dp-header">
        <button class="dp-close" id="dp-close">×</button>
        <div id="dp-badge" class="dp-type-badge"></div>
        <div id="dp-name" class="dp-name"></div>
      </div>
      <div class="dp-body">
        <div id="dp-desc" class="dp-desc"></div>
        <div class="dp-rows" id="dp-rows"></div>
        <div id="dp-highlight" class="dp-highlight"></div>
      </div>
    </div>
  </main>

</div>

<script>
// ── ICON CONFIGS ──
const TYPE_CONFIG = {
  academic: { color: '#388bfd', bg: 'rgba(56,139,253,0.2)', emoji: '🎓', label: 'Academic' },
  sports:   { color: '#56d364', bg: 'rgba(86,211,100,0.2)', emoji: '⚽', label: 'Sports' },
  cafe:     { color: '#f78166', bg: 'rgba(247,129,102,0.2)', emoji: '☕', label: 'Cafe' },
};
const CAMPUS_COLOR = { bidholi: '#1f6feb', kandoli: '#238636' };

function makeIcon(type, campus) {
  const cfg = TYPE_CONFIG[type];
  const cColor = CAMPUS_COLOR[campus];
  return L.divIcon({
    className: '',
    html: `<div style="
      width:32px;height:32px;border-radius:8px;
      background:${cfg.bg};
      border:2px solid ${cfg.color};
      display:flex;align-items:center;justify-content:center;
      font-size:14px;
      box-shadow:0 2px 8px rgba(0,0,0,0.4);
      position:relative;
    ">
      ${cfg.emoji}
      <div style="
        position:absolute;bottom:-2px;right:-2px;
        width:8px;height:8px;border-radius:50%;
        background:${cColor};border:1px solid #0d1117;
      "></div>
    </div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -18]
  });
}

// ── STATE ──
let state = { campus: 'all', type: 'all', query: '', places: [], markers: {}, selected: null };
let map;

// ── INIT MAP ──
function initMap() {
  map = L.map('map', {
    zoomControl: true,
    scrollWheelZoom: true,
    attributionControl: true
  }).setView([30.40, 77.968], 14);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  map.on('mousemove', e => {
    document.getElementById('coord-display').textContent =
      `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
  });

  // Campus boundary circles
  L.circle([30.4159, 77.9667], { radius: 350, color: '#1f6feb', weight: 1, fillColor: '#1f6feb', fillOpacity: 0.04, dashArray: '4 4' }).addTo(map)
    .bindTooltip('<b style="font-family:DM Sans">Bidholi Campus</b><br><small>Energy Acres</small>', { permanent: false, direction: 'top' });
  L.circle([30.3836, 77.9698], { radius: 280, color: '#238636', weight: 1, fillColor: '#238636', fillOpacity: 0.04, dashArray: '4 4' }).addTo(map)
    .bindTooltip('<b style="font-family:DM Sans">Kandoli Campus</b><br><small>Knowledge Acres</small>', { permanent: false, direction: 'top' });

  // Campus labels
  L.marker([30.4180, 77.9667], { icon: L.divIcon({ className: '', html: '<div style="font-family:Playfair Display,serif;font-size:11px;font-weight:700;color:#58a6ff;background:rgba(13,17,23,0.8);padding:3px 8px;border-radius:4px;border:1px solid rgba(31,111,235,0.3);white-space:nowrap;">⚡ BIDHOLI — Energy Acres</div>', iconAnchor: [70, 12] }) }).addTo(map);
  L.marker([30.3820, 77.9698], { icon: L.divIcon({ className: '', html: '<div style="font-family:Playfair Display,serif;font-size:11px;font-weight:700;color:#3fb950;background:rgba(13,17,23,0.8);padding:3px 8px;border-radius:4px;border:1px solid rgba(35,134,54,0.3);white-space:nowrap;">📚 KANDOLI — Knowledge Acres</div>', iconAnchor: [80, 12] }) }).addTo(map);
}

// ── LOAD & RENDER ──
async function loadPlaces() {
  const res = await fetch('/api/stats');
  const stats = await res.json();
  document.getElementById('s-academic').textContent = stats.by_type.academic || 0;
  document.getElementById('s-sports').textContent = stats.by_type.sports || 0;
  document.getElementById('s-cafe').textContent = stats.by_type.cafe || 0;

  const res2 = await fetch('/api/places');
  const data = await res2.json();
  state.places = data.places;
  renderAll();
}

function getFiltered() {
  return state.places.filter(p => {
    if (state.campus !== 'all' && p.campus !== state.campus) return false;
    if (state.type !== 'all' && p.type !== state.type) return false;
    if (state.query) {
      const q = state.query.toLowerCase();
      const text = `${p.name} ${p.short} ${p.description} ${p.type} ${p.campus}`.toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });
}

function renderAll() {
  const filtered = getFiltered();
  document.getElementById('visible-count').textContent = filtered.length;
  renderList(filtered);
  renderMarkers(filtered);
}

function renderList(places) {
  const list = document.getElementById('place-list');
  if (places.length === 0) {
    list.innerHTML = '<div class="no-results">No locations found</div>';
    return;
  }
  list.innerHTML = places.map((p, i) => {
    const cfg = TYPE_CONFIG[p.type];
    const sel = state.selected === p.id ? 'selected' : '';
    const delay = Math.min(i * 20, 200);
    return `<div class="place-item ${sel}" data-id="${p.id}" style="animation-delay:${delay}ms" onclick="selectPlace(${p.id})">
      <div class="pi-icon ${p.type}">${cfg.emoji}</div>
      <div class="pi-info">
        <div class="pi-name">${p.short}</div>
        <div class="pi-meta">
          <span class="campus-pill cp-${p.campus[0]}">${p.campus.toUpperCase()}</span>
          <span>${p.type}</span>
          ${p.hours ? `<span>${p.hours}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderMarkers(places) {
  // Remove all old markers
  Object.values(state.markers).forEach(m => map.removeLayer(m));
  state.markers = {};
  places.forEach(p => {
    const marker = L.marker([p.lat, p.lng], { icon: makeIcon(p.type, p.campus) }).addTo(map);
    marker.on('click', () => selectPlace(p.id));
    marker.bindTooltip(`<div style="font-family:DM Sans;font-size:12px;font-weight:500">${p.name}</div>`, { direction: 'top', offset: [0, -10] });
    state.markers[p.id] = marker;
  });
}

// ── SELECT PLACE ──
function selectPlace(id) {
  state.selected = id;
  const place = state.places.find(p => p.id === id);
  if (!place) return;

  // Update list highlight
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.place-item[data-id="${id}"]`);
  if (el) { el.classList.add('selected'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  // Pan map
  map.panTo([place.lat, place.lng], { animate: true, duration: 0.6 });

  // Open marker tooltip briefly
  const marker = state.markers[id];
  if (marker) { marker.openTooltip(); setTimeout(() => marker.closeTooltip(), 2000); }

  // Detail panel
  const cfg = TYPE_CONFIG[place.type];
  const panel = document.getElementById('detail-panel');
  document.getElementById('dp-badge').textContent = cfg.label.toUpperCase();
  document.getElementById('dp-badge').className = `dp-type-badge dtb-${place.type}`;
  document.getElementById('dp-name').textContent = place.name;
  document.getElementById('dp-desc').textContent = place.description;

  // Build rows
  const rows = [];
  if (place.hours) rows.push(['Hours', place.hours]);
  if (place.floors) rows.push(['Floors', place.floors]);
  if (place.capacity) rows.push(['Capacity', place.capacity]);
  if (place.surface) rows.push(['Surface', place.surface]);
  if (place.seating) rows.push(['Seating', place.seating]);
  if (place.speciality) rows.push(['Menu', place.speciality]);
  rows.push(['Campus', place.campus === 'bidholi' ? '⚡ Bidholi (Energy Acres)' : '📚 Kandoli (Knowledge Acres)']);
  rows.push(['Coords', `${place.lat.toFixed(4)}, ${place.lng.toFixed(4)}`]);

  document.getElementById('dp-rows').innerHTML = rows.map(([l, v]) =>
    `<div class="dp-row"><div class="dp-row-label">${l}</div><div class="dp-row-val">${v}</div></div>`
  ).join('');

  if (place.highlight) {
    document.getElementById('dp-highlight').innerHTML = `<span>★</span> <span>${place.highlight}</span>`;
    document.getElementById('dp-highlight').style.display = 'flex';
  } else {
    document.getElementById('dp-highlight').style.display = 'none';
  }

  panel.classList.add('open');
}

// ── CONTROLS ──
document.getElementById('dp-close').onclick = () => {
  document.getElementById('detail-panel').classList.remove('open');
  state.selected = null;
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('selected'));
};

// Campus toggle
document.querySelectorAll('.ctbtn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.ctbtn').forEach(b => b.className = 'ctbtn');
    const c = btn.dataset.campus;
    if (c === 'all') btn.classList.add('active-all');
    else if (c === 'bidholi') btn.classList.add('active-b');
    else btn.classList.add('active-k');
    state.campus = c;
    renderAll();
    if (c === 'bidholi') map.flyTo([30.4159, 77.9667], 15, { duration: 1 });
    else if (c === 'kandoli') map.flyTo([30.3836, 77.9698], 15, { duration: 1 });
    else map.flyTo([30.40, 77.968], 14, { duration: 1 });
  };
});

// Type filter
document.querySelectorAll('.tfbtn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tfbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.type = btn.dataset.t;
    renderAll();
  };
});

// Search
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.query = e.target.value.trim();
    renderAll();
  }, 250);
});

// ── BOOT ──
initMap();
loadPlaces();
</script>
</body>
</html>
